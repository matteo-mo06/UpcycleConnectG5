upstream backend_api {
    server backend:8084;
}

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;

    # Toutes les routes API → backend Go
    location ~ ^/(auth|user|admin|announcements|upload|uploads|events|forum|formations|reports|deposit-requests|professional-request|sse) {
        proxy_pass http://backend_api;
    }

    # Frontend Vue SPA — fallback sur index.html pour le vue-router
    location / {
        try_files $uri $uri/ /index.html;
    }
}
