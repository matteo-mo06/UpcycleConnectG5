services:
  db:
    image: mysql:8.0
    container_name: upcycle-connect_mysql
    environment:
      MYSQL_DATABASE: upcycle
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
    command: ["--default-authentication-plugin=mysql_native_password"]

volumes:
  dbdata:
