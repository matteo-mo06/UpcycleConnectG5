root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o tmp\\main.exe .\\cmd\\api"
bin = "tmp\\main.exe"
full_bin = "tmp\\main.exe"
include_ext = ["go"]
exclude_dir = ["tmp", "vendor", "db\\migrations"]
delay = 500
stop_on_error = true
send_interrupt = true
kill_delay = 500

[log]
time = true

[color]
main = "yellow"
watcher = "cyan"
build = "green"
runner = "magenta"

[misc]
clean_on_exit = true